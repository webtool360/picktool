<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMI Calculator - PickTool</title>
    <!-- This links perfectly to your master CSS -->
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>

    <div class="calculator-container">
        <h1>BMI Calculator</h1>
        <p>Check your Body Mass Index and health category.</p>

        <div class="input-group">
            <label for="weight">Weight (kg):</label>
            <input type="number" id="weight" placeholder="e.g., 70">
        </div>

        <div class="input-group">
            <label for="height">Height (cm):</label>
            <input type="number" id="height" placeholder="e.g., 175">
        </div>

        <button id="calculate-btn">Calculate BMI</button>

        <div id="result" class="result-box">
            <!-- The BMI result will appear here -->
        </div>
        
        <a href="../index.html" class="back-link">← Back to PickTool Home</a>
    </div>

    <!-- This links perfectly to the JS file you just made -->
    <script src="../assets/js/bmi-calculator.js"></script>
</body>
</html>
