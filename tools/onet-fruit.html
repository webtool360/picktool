<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Onet Fruit Classic</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            padding: 20px; 
            background-color: #f4f4f9; 
            text-align: center; 
            margin: 0; 
        }
        .header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            max-width: 400px; 
            margin: 0 auto 20px; 
            padding-top: 10px; 
        }
        .back-btn { 
            text-decoration: none; 
            color: #007bff; 
            font-weight: bold; 
            font-size: 16px; 
        }
        .score-board { 
            font-size: 18px; 
            font-weight: bold; 
            background: #fff; 
            padding: 8px 15px; 
            border-radius: 20px; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.1); 
        }
        
        h2 { margin-top: 0; color: #333; }

        #game-board {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            gap: 4px;
            background: #8D6E63; 
            padding: 8px;
            border-radius: 8px;
            margin: 0 auto;
            max-width: 100%;
            width: 400px; 
            box-sizing: border-box;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
        }
        
        .tile {
            aspect-ratio: 1;
            background: #FFFDE7;
            border-radius: 6px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: clamp(16px, 6vw, 26px); 
            cursor: pointer;
            box-shadow: 0 3px 0 #D7CCC8;
            user-select: none;
            transition: transform 0.1s, box-shadow 0.1s, background 0.1s;
        }
        .tile:active:not(.empty) {
            transform: translateY(3px);
            box-shadow: 0 0 0 #D7CCC8;
        }
        .tile.empty {
            background: transparent;
            box-shadow: none;
            cursor: default;
        }
        .tile.selected {
            background: #B2EBF2;
            border: 2px solid #00BCD4;
            box-shadow: 0 1px 0 #00ACC1;
            transform: translateY(2px);
            box-sizing: border-box;
        }

        .controls { margin-top: 25px; }
        .btn { 
            padding: 12px 24px; 
            border: none; 
            border-radius: 25px; 
            background: #E91E63; 
            color: white; 
            font-weight: bold; 
            font-size: 16px; 
            cursor: pointer; 
            margin: 0 8px; 
            box-shadow: 0 4px 0 #C2185B; 
            transition: all 0.1s; 
        }
        .btn:active { 
            transform: translateY(4px); 
            box-shadow: 0 0 0 #C2185B; 
        }
    </style>
</head>
<body>
    <div class="header">
        <a href="../index.html" class="back-btn">&larr; Back</a>
        <div class="score-board">Score: <span id="score">0</span></div>
    </div>
    
    <h2>Onet Fruit Classic</h2>
    
    <div id="game-board"></div>
    
    <div class="controls">
        <button class="btn" onclick="initGame()">New Game</button>
        <button class="btn" onclick="shuffleGrid()">Shuffle</button>
    </div>

    <!-- This line links to your separate JS file -->
    <script src="onet-fruit.js"></script>
</body>
</html>
