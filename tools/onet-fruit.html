<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Onet Fruit Classic</title>
    <!-- CSS linked to your global style file -->
    <link rel="stylesheet" href="../assets/css/style.css">
    <style>
        /* Tool-specific overrides matching Age Calculator design */
        body {
            font-family: sans-serif;
            background-color: #f0f4f9; 
            padding: 20px;
            display: flex;
            justify-content: center;
            margin: 0;
        }
        .container {
            background-color: white;
            border: 2px solid #3b5998; 
            border-radius: 12px;
            padding: 25px 20px;
            width: 100%;
            max-width: 420px;
            box-sizing: border-box;
            text-align: center;
        }
        h2 {
            color: #3b5998;
            margin-top: 0;
            font-size: 26px;
            margin-bottom: 5px;
        }
        .score-text {
            font-size: 16px;
            color: #333;
            margin-bottom: 15px;
        }
        
        /* Game Board */
        #game-board {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            gap: 3px;
            background: #e4e9f0; 
            padding: 5px;
            border-radius: 8px;
            margin: 0 auto 20px auto;
            width: 100%;
            box-sizing: border-box;
        }
        .tile {
            aspect-ratio: 1;
            background: #ffffff;
            border-radius: 4px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: clamp(16px, 6vw, 24px); 
            cursor: pointer;
            user-select: none;
            box-shadow: 0 2px 0 #cbd5e1;
            transition: transform 0.1s;
        }
        .tile:active:not(.empty) {
            transform: translateY(2px);
            box-shadow: none;
        }
        .tile.empty {
            background: transparent;
            box-shadow: none;
            cursor: default;
        }
        .tile.selected {
            background: #dbeafe;
            border: 2px solid #3b82f6;
            box-sizing: border-box;
        }

        /* Buttons & Caption */
        .game-controls {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 15px;
        }
        .btn {
            background-color: #3b5998; 
            color: white;
            border: none;
            border-radius: 6px;
            padding: 12px;
            font-size: 16px;
            width: 100%;
            cursor: pointer;
        }
        .btn:active {
            opacity: 0.8;
        }
        .instructions {
            font-size: 14px;
            color: #555;
            margin-bottom: 15px;
            font-style: italic;
        }
        .back-link {
            display: inline-block;
            color: #3b5998;
            text-decoration: none;
            font-size: 16px;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Onet Fruit Classic</h2>
        <div class="score-text">Score: <span id="score">0</span></div>
        
        <div id="game-board"></div>
        
        <div class="game-controls">
            <button class="btn" onclick="initGame()">New Game</button>
            <button class="btn" onclick="shuffleGrid()">Shuffle</button>
        </div>
        
        <!-- The instruction caption placed above the back link -->
        <p class="instructions">Connect two matching fruits with a line of up to two corners.</p>
        
        <a href="../index.html" class="back-link">&larr; Back to PickTool Home</a>
    </div>

    <!-- JS linked using the standardized path -->
    <script src="../assets/js/onet-fruit.js"></script>
</body>
</html>
