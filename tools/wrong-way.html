<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wrong Way - PickTool</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <style>
        body { background-color: #f0f4f8; display: flex; justify-content: center; padding: 20px; font-family: sans-serif; margin: 0; }
        .tool-container { background: white; border: 2px solid #3b5998; border-radius: 20px; padding: 20px; width: 100%; max-width: 420px; text-align: center; box-sizing: border-box; }
        
        .scoreboard { display: flex; justify-content: space-between; margin-bottom: 15px; font-weight: bold; }
        .score-box { padding: 10px; border-radius: 10px; width: 45%; transition: 0.3s; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .red-score { background: #d93838; color: white; opacity: 1; }
        .blue-score { background: #2d5aa0; color: white; opacity: 0.5; } /* Opacity changes on turn */
        
        .rules { font-size: 0.85em; color: #555; margin-bottom: 15px; text-align: left; background: #f9f9f9; padding: 10px; border-radius: 8px; }
        
        select { width: 100%; padding: 10px; margin-bottom: 15px; border: 1px solid #3b5998; border-radius: 5px; cursor: pointer; }

        /* 17x17 Grid: 9 cells (35px) + 8 wall slots (10px) */
        #game-board {
            display: grid;
            grid-template-columns: repeat(8, 35px 10px) 35px;
            grid-template-rows: repeat(8, 35px 10px) 35px;
            background: #e6e6e6;
            padding: 10px;
            border-radius: 10px;
            margin: 0 auto;
            width: max-content;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.2);
            border: 2px solid #ccc;
        }

        .cell { background: white; border-radius: 4px; display: flex; justify-content: center; align-items: center; cursor: pointer; }
        .cell:hover { background: #f0f0f0; }
        
        .wall-slot { background: transparent; cursor: pointer; transition: background 0.2s; }
        .wall-slot:hover { background: #ffcccc; } /* Preview color */
        
        .wall-h { grid-column: span 3; height: 10px; }
        .wall-v { grid-row: span 3; width: 10px; }
        .wall-placed { background: #333 !important; border-radius: 5px; cursor: not-allowed; }

        .player { width: 25px; height: 25px; border-radius: 50%; box-shadow: 0 3px 5px rgba(0,0,0,0.4); }
        .player-red { background: radial-gradient(circle at 30% 30%, #ff6b6b, #d93838); }
        .player-blue { background: radial-gradient(circle at 30% 30%, #6b9fff, #2d5aa0); }

        .controls { margin-top: 15px; display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; }
        .control-btn { padding: 8px 15px; border: 2px solid #ccc; background: white; border-radius: 8px; cursor: pointer; font-weight: bold; color: #555; }
        .control-btn.active { border-color: #3b5998; background: #ebf2ff; color: #3b5998; }

        .status-msg { margin-top: 10px; font-weight: bold; color: #d93838; min-height: 20px;}
        .back-link { display: inline-block; margin-top: 20px; color: #3b5998; font-weight: bold; text-decoration: none; }
    </style>
</head>
<body>

<div class="tool-container">
    <div class="scoreboard">
        <div class="score-box red-score" id="red-panel">🔴 Red Walls: <span id="red-walls">6</span></div>
        <div class="score-box blue-score" id="blue-panel">🔵 Blue Walls: <span id="blue-walls">6</span></div>
    </div>

    <div class="rules">
        <strong>Rules:</strong> Move your ball 1 space OR place a wall. Reach the opposite side to win. You cannot completely trap your opponent!
    </div>

    <select id="game-mode" onchange="setGameMode(this.value)">
        <option value="pvp">Vs Human (Local)</option>
        <option value="pve">Vs Bot (Computer)</option>
    </select>

    <div id="game-board"></div>

    <div class="controls">
        <button class="control-btn active" id="btn-move" onclick="setAction('move')">Move Ball</button>
        <button class="control-btn" id="btn-wall-h" onclick="setAction('wall-h')">➖ Horizontal Wall</button>
        <button class="control-btn" id="btn-wall-v" onclick="setAction('wall-v')">| Vertical Wall</button>
    </div>
    
    <div class="status-msg" id="status-msg">Red's Turn</div>

    <a href="../index.html" class="back-link">← Back to PickTool Home</a>
</div>

<script src="../assets/js/wrong-way.js"></script>
</body>
</html>
