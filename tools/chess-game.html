<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chess PvP</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <style>
        body { font-family: sans-serif; background-color: #f0f4f9; padding: 20px; display: flex; justify-content: center; margin: 0; }
        .container { background-color: white; border: 2px solid #3b5998; border-radius: 12px; padding: 15px; width: 100%; max-width: 400px; text-align: center; }
        h2 { color: #3b5998; margin: 0 0 10px 0; font-size: 22px; }
        
        #chess-board { 
            display: grid; 
            grid-template-columns: repeat(8, 1fr); 
            border: 2px solid #3b5998;
            margin-bottom: 10px;
        }
        .square { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; font-size: 24px; cursor: pointer; }
        .light { background-color: #f0d9b5; }
        .dark { background-color: #b58863; }
        .selected { background-color: #7b61ff !important; }
        
        .status { font-weight: bold; margin-bottom: 10px; color: #333; }
        .back-link { display: inline-block; color: #3b5998; text-decoration: none; font-size: 15px; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Chess PvP</h2>
        <div class="status">Turn: <span id="turn-display">White</span></div>
        <div id="chess-board"></div>
        <a href="../index.html" class="back-link">&larr; Back to Home</a>
    </div>
    <script src="../assets/js/chess-game.js"></script>
</body>
</html>
