<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shooting Bubble</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <style>
        body { font-family: sans-serif; background-color: #f0f4f9; padding: 20px; display: flex; justify-content: center; margin: 0; }
        .container { background-color: white; border: 2px solid #3b5998; border-radius: 12px; padding: 15px; width: 100%; max-width: 400px; text-align: center; }
        h2 { color: #3b5998; margin: 0 0 10px 0; font-size: 22px; }
        #gameCanvas { background: #f9f9f9; border-radius: 8px; width: 100%; height: 400px; border: 1px solid #ddd; cursor: crosshair; display: block; }
        .controls { display: flex; gap: 5px; margin-top: 10px; margin-bottom: 10px; }
        .btn { background-color: #3b5998; color: white; border: none; border-radius: 6px; padding: 8px; font-size: 13px; flex: 1; cursor: pointer; }
        .btn:active { opacity: 0.8; }
        .back-link { display: inline-block; color: #3b5998; text-decoration: none; font-size: 15px; margin-top: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Shooting Bubble</h2>
        <div style="font-weight: bold; margin-bottom:5px;">Time: <span id="timer">--:--</span></div>
        <canvas id="gameCanvas" width="400" height="400"></canvas>
        <div class="controls">
            <button class="btn" onclick="startGame(60)">1 Min</button>
            <button class="btn" onclick="startGame(120)">2 Min</button>
            <button class="btn" onclick="startGame(180)">3 Min</button>
        </div>
        <a href="../index.html" class="back-link">&larr; Back to Home</a>
    </div>
    <script src="../assets/js/shooting-bubble.js"></script>
</body>
</html>
