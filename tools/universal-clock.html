<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal Clock - PickTool</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <style>
        /* Design matching your photo */
        body { background-color: #f0f4f8; display: flex; justify-content: center; padding: 20px; font-family: sans-serif; }
        .tool-container { background: white; border: 2px solid #3b5998; border-radius: 20px; padding: 20px; width: 100%; max-width: 400px; text-align: center; }
        
        /* Rules box */
        .rules { font-size: 0.9em; color: #555; margin-bottom: 20px; text-align: left; }
        
        /* Clock Styling */
        .clock-face { width: 150px; height: 150px; border: 4px solid #3b5998; border-radius: 50%; margin: 20px auto; position: relative; }
        .hand { position: absolute; bottom: 50%; left: 50%; transform-origin: bottom; background: #3b5998; border-radius: 5px; }
        .hour-hand { width: 4px; height: 40px; }
        .min-hand { width: 3px; height: 60px; }
        
        select { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; }
        .digital { font-size: 1.5em; font-weight: bold; color: #3b5998; margin: 10px 0; }
        .back-btn { display: block; margin-top: 20px; color: #3b5998; font-weight: bold; text-decoration: none; }
    </style>
</head>
<body>

<div class="tool-container">
    <h2>Universal Clock</h2>
    <div class="rules">
        Select a country or time zone to see the local time. <br>
        The clock will display both an analog face and digital time.
    </div>

    <select id="timezoneSelect" onchange="updateClock()">
        <option value="UTC">UTC (Universal)</option>
        <option value="Asia/Karachi">Pakistan (PKT)</option>
        <option value="America/New_York">New York (EST)</option>
        <option value="Europe/London">London (GMT)</option>
        <option value="Asia/Dubai">Dubai (GST)</option>
    </select>

    <div class="clock-face">
        <div id="hourHand" class="hand hour-hand"></div>
        <div id="minHand" class="hand min-hand"></div>
    </div>

    <div id="digitalClock" class="digital">00:00:00</div>
    <div id="currentDate">Date</div>

    <a href="../index.html" class="back-btn">← Back to PickTool Home</a>
</div>

<script src="../assets/js/universal-clock.js"></script>
</body>
</html>
