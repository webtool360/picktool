<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Currency Converter - PickTool</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <style>
        /* Container to keep ads organized and centered */
        .ad-container { text-align: center; margin: 20px 0; }
    </style>

<body>

    <div class="calculator-container">
        <h1>Currency Converter</h1>
        <p>Convert your money instantly.</p>

        <div class="input-group">
            <label for="amount">Amount (PKR):</label>
            <input type="number" id="amount" placeholder="e.g., 1000">
        </div>

        <div class="input-group">
            <label for="currency">Convert to:</label>
            <select id="currency" style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; font-size: 16px;">
                <option value="USD">USD (US Dollar)</option>
                <option value="EUR">EUR (Euro)</option>
                <option value="GBP">GBP (British Pound)</option>
            </select>
        </div>

        <button id="calculate-btn">Convert Now</button>

        <div id="result" class="result-box"></div>
        
        <a href="../index.html" class="back-link">← Back to PickTool Home</a>
    </div>

    <script src="../assets/js/currency-converter.js"></script>

        <!-- 320x50 Banner -->
