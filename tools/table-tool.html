<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Table</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; padding: 20px; background-color: #f4f4f9; color: #333; }
        table { border-collapse: collapse; width: 100%; margin-top: 15px; background: #fff; border: 1px solid #ddd; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: center; }
        th { background-color: #f8f8f8; font-weight: 600; }
        input { width: 90%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { padding: 10px 15px; margin-right: 5px; cursor: pointer; background-color: #007bff; color: white; border: none; border-radius: 4px; }
        #summary { margin-top: 20px; padding: 15px; background: #fff; border: 1px solid #ddd; border-radius: 4px; }
    </style>
</head>
<body>
    <input type="text" id="title" placeholder="Enter Table Title" style="width: 100%; padding: 10px; margin-bottom: 10px;">
    <button onclick="addCol()">+ Column</button>
    <button onclick="addRow()">+ Row</button>
    <table id="tbl">
        <thead><tr id="head"><th>SN</th></tr></thead>
        <tbody id="body"></tbody>
    </table>
    <div id="summary">
        <p>Total Items (Rows): <span id="count">0</span></p>
        <p>Grand Total (Digit Sum): <span id="grandTotal">0</span></p>
    </div>

    <script>
        let rowCount = 0;
        let colCount = 0;

        function addCol() {
            colCount++;
            let head = document.getElementById('head');
            let th = document.createElement('th');
            th.innerText = "Col " + colCount;
            head.appendChild(th);
            let rows = document.getElementById('body').rows;
            for(let r of rows) {
                let cell = r.insertCell(-1);
                cell.innerHTML = '<input type="text" class="val" oninput="updateSummary()">';
            }
        }

        function addRow() {
            rowCount++;
            let row = document.getElementById('body').insertRow();
            row.insertCell(0).innerText = rowCount;
            for(let i=0; i<colCount; i++) {
                row.insertCell(-1).innerHTML = '<input type="text" class="val" oninput="updateSummary()">';
            }
            updateSummary();
        }

        function updateSummary() {
            let inputs = document.querySelectorAll('.val');
            let grand = 0;
            inputs.forEach(i => grand += Number(i.value) || 0);
            document.getElementById('count').innerText = rowCount;
            document.getElementById('grandTotal').innerText = grand;
        }
    </script>
</body>
</html>
