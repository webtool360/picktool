<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Complex Calculator - PickTool</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <style>
        .calc-screen { width: 100%; padding: 15px; font-size: 24px; text-align: right; margin-bottom: 10px; border-radius: 5px; border: 1px solid #ccc; }
        .buttons { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        button { padding: 15px; font-size: 18px; cursor: pointer; }
        .advanced { display: none; } /* Hidden by default */
        .ad-container { text-align: center; margin: 20px 0; }
    </style>
</head>
<body>
    <div class="calculator-container">
        <h1>Complex Calculator</h1>
        <button id="toggle-btn" style="background:#555; color:white;">Switch to Engineering Mode</button>
        <br><br>
        <input type="text" id="screen" class="calc-screen" disabled>
        
        <div class="buttons">
            <button onclick="clearScreen()">C</button>
            <button onclick="appendToScreen('/')">/</button>
            <button onclick="appendToScreen('*')">*</button>
            <button onclick="backspace()">DEL</button>
            <button onclick="appendToScreen('7')">7</button>
            <button onclick="appendToScreen('8')">8</button>
            <button onclick="appendToScreen('9')">9</button>
            <button onclick="appendToScreen('-')">-</button>
            <button onclick="appendToScreen('4')">4</button>
            <button onclick="appendToScreen('5')">5</button>
            <button onclick="appendToScreen('6')">6</button>
            <button onclick="appendToScreen('+')">+</button>
            <button onclick="appendToScreen('1')">1</button>
            <button onclick="appendToScreen('2')">2</button>
            <button onclick="appendToScreen('3')">3</button>
            <button onclick="calculate('=')">=</button>
            <button onclick="appendToScreen('0')">0</button>
            <button onclick="appendToScreen('.')">.</button>
            
            <!-- Engineering Buttons -->
            <button class="advanced" onclick="mathFunc('sin')">sin</button>
            <button class="advanced" onclick="mathFunc('cos')">cos</button>
            <button class="advanced" onclick="mathFunc('sqrt')">√</button>
            <button class="advanced" onclick="mathFunc('pow')">x²</button>
        </div>
        <br>
        <a href="../index.html" class="back-link">← Back to PickTool Home</a>
    </div>
    
    <script src="../assets/js/complex-calculator.js"></script>

    <!-- Combined Ad Container -->
    <div class="ad-container">
        <!-- Native Banner -->
        <script async="async" data-cfasync="false" src="https://pl30385676.effectivecpmnetwork.com/f26bff16986a00f00797d30a72cc69cd/invoke.js"></script>
        <div id="container-f26bff16986a00f00797d30a72cc69cd"></div>

        <!-- 320x50 Banner -->
        <div style="margin-top: 15px;">
            <script>
                atOptions = {
                    'key' : 'be0e2dff2e618dbdd1d0dd94294cffc8',
                    'format' : 'iframe',
                    'height' : 50,
                    'width' : 320,
                    'params' : {}
                };
            </script>
            <script src="https://www.highperformanceformat.com/be0e2dff2e618dbdd1d0dd94294cffc8/invoke.js"></script>
        </div>
    </div>
</body>
</html>
