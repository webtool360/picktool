<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic-Tac-Toe - PickTool</title>
    <!-- Link to main CSS -->
    <link rel="stylesheet" href="../assets/css/style.css">
    <style>
        body { 
            font-family: Arial, sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            background-color: #f4f7f6; 
            margin: 0; 
            padding: 20px; 
        }
        h2 { color: #3b5998; margin-bottom: 5px; }
        .status { margin-bottom: 20px; font-size: 1.2em; font-weight: bold; color: #333; }
        
        .board { 
            display: grid; 
            grid-template-columns: repeat(3, 100px); 
            grid-gap: 5px; 
            background-color: #3b5998; 
            padding: 5px; 
            border-radius: 10px;
        }
        .cell { 
            width: 100px; 
            height: 100px; 
            background-color: white; 
            font-size: 3em; 
            font-weight: bold;
            display: flex; 
            justify-content: center; 
            align-items: center; 
            cursor: pointer; 
            border-radius: 5px;
            transition: background-color 0.2s;
        }
        .cell:hover { background-color: #e0e5f2; }
        
        .reset-btn { 
            margin-top: 25px; 
            padding: 10px 25px; 
            font-size: 1.1em; 
            background-color: #3b5998; 
            color: white; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: bold;
        }
        .reset-btn:hover { background-color: #2d4373; }
        .back-link { 
            margin-top: 30px; 
            text-decoration: none; 
            color: #3b5998; 
            font-weight: bold; 
            font-size: 1.1em;
        }
        .back-link:hover { text-decoration: underline; }
    </style>
</head>
<body>

    <h2>Tic-Tac-Toe</h2>
    <div class="status" id="status">Player X's Turn</div>
    
    <div class="board" id="board">
        <div class="cell" onclick="makeMove(0)"></div>
        <div class="cell" onclick="makeMove(1)"></div>
        <div class="cell" onclick="makeMove(2)"></div>
        <div class="cell" onclick="makeMove(3)"></div>
        <div class="cell" onclick="makeMove(4)"></div>
        <div class="cell" onclick="makeMove(5)"></div>
        <div class="cell" onclick="makeMove(6)"></div>
        <div class="cell" onclick="makeMove(7)"></div>
        <div class="cell" onclick="makeMove(8)"></div>
    </div>

    <button class="reset-btn" onclick="resetGame()">🔄 Restart Game</button>
    <a href="../index.html" class="back-link">← Back to PickTool</a>

    <!-- Link to the JS file -->
    <script src="../assets/js/tic-tac-toe.js"></script>
</body>
</html>
