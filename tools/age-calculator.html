<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Age Calculator - PickTool</title>
    <!-- Links to your main design file -->
    <link rel="stylesheet" href="../../assets/css/style.css">
</head>
<body>

    <div class="calculator-container">
        <h1>Age Calculator</h1>
        <p>Find out your exact age in years, months, and days.</p>

        <div class="input-group">
            <label for="birthdate">Enter your Date of Birth:</label>
            <input type="date" id="birthdate">
        </div>

        <button id="calculate-btn">Calculate Age</button>

        <div id="result" class="result-box">
            <!-- The exact age result will appear here -->
        </div>
        
        <a href="../../index.html" class="back-link">← Back to PickTool Home</a>
    </div>

    <!-- Links to the logic file below -->
    <script src="../../assets/js/age-calculator.js"></script>
</body>
</html>
