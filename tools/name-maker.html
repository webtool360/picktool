<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fancy Name Maker</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background-color: #f4f4f9; }
        input { width: 100%; padding: 12px; margin-bottom: 20px; border: 1px solid #ccc; border-radius: 4px; }
        .row { background: #fff; padding: 10px; margin-bottom: 8px; border: 1px solid #ddd; display: flex; justify-content: space-between; align-items: center; }
        button { padding: 8px 15px; background: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>
    <a href="../index.html">&larr; Back</a>
    <h2>Fancy Name Maker</h2>
    <input type="text" id="input" placeholder="Enter name..." oninput="update()">
    <div id="list"></div>
    <button id="more" onclick="showMore()">Show More</button>

    <script>
        // Unicode font maps
        const maps = [
            "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz",
            "𝓐𝓑𝓒𝓓𝓔𝓕𝓖𝓗𝓘𝓙𝓚𝓛𝓜𝓝𝓞𝓟𝓠𝓡𝓢𝓣𝓤𝓥𝓦𝓧𝓨𝓩𝓪𝓫𝓬𝓭𝓮𝓯𝓰𝓱𝓲𝓳𝓴𝓵𝓶𝓷𝓸𝓹𝓺𝓻𝓼𝓽𝓾𝓿𝔀𝔁𝔂𝔃",
            "𝔄𝔅ℭ𝔇𝔈𝔉𝔊ℌℑ𝔍𝔎𝔏𝔐𝔑𝔒𝔓𝔔ℜ𝔖𝔗𝔘𝔙𝔚𝔛𝔜ℨ𝔞𝔟𝔠𝔡𝔢𝔣𝔤𝔥𝔦𝔧𝔨𝔩𝔪𝔫𝔬𝔭𝔮𝔯𝔰𝔱𝔲𝔳𝔴𝔵𝔶𝔷",
            "𝔸𝔹ℂ𝔻𝔼𝔽𝔾ℍ𝕀𝕁𝕂𝕃𝕄ℕ𝕆ℙℚℝ𝕊𝕋𝕌𝕍𝕎𝕏𝕐ℤ𝕒𝕓𝕔𝕕𝕖𝕗𝕘𝕙𝕚𝕛𝕜𝕝𝕞𝕟𝕠𝕡𝕢𝕣𝕤𝕥𝕦𝕧𝕨𝕩𝕪𝕫",
            "🅰🅱🅲🅳🅴🅵🅶🅷🅸🅹🅺🅻🅼🅽🅾🅿🆀🆁🆂🆃🆄🆅🆆🆇🆈🆉",
            "ⓐⓑⓒⓓⓔⓕⓖⓗⓘⓙⓚⓛⓜⓝⓞⓟⓠⓡⓢⓣⓤⓥⓦⓧⓨⓩ",
            // Add more map strings here to reach 200
        ];

        let count = 0;
        function transform(text, mapIndex) {
            if (mapIndex === 0) return text;
            const plain = maps[0];
            const fancy = maps[mapIndex];
            return text.split('').map(char => {
                const idx = plain.indexOf(char);
                return idx > -1 ? fancy[idx] : char;
            }).join('');
        }

        function update() {
            count = 0;
            document.getElementById('list').innerHTML = '';
            showMore();
        }

        function showMore() {
            const val = document.getElementById('input').value || "Your Name";
            const list = document.getElementById('list');
            for(let i=0; i<20; i++) {
                if(count >= 200) break;
                const stylized = transform(val, count % maps.length);
                const div = document.createElement('div');
                div.className = 'row';
                div.innerHTML = `<span>${stylized}</span><button onclick="copy('${stylized}')">Copy</button>`;
                list.appendChild(div);
                count++;
            }
        }
        function copy(t) { navigator.clipboard.writeText(t); alert('Copied!'); }
    </script>
</body>
</html>
