<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gold Calculator - PickTool</title>
    <!-- Connects to your master CSS -->
    <link rel="stylesheet" href="../assets/css/style.css">
    <style>
        /* Container to keep ads organized and centered */
        .ad-container { text-align: center; margin: 20px 0; }
    </style>
</head>
<body>

    <div class="calculator-container">
        <h1>Gold Calculator</h1>
        <p>Calculate your gold's overall price in PKR.</p>

        <div class="input-group">
            <label for="gold-rate">Current Gold Rate:</label>
            <input type="number" id="gold-rate" placeholder="e.g., 240000">
        </div>

        <!-- We add a <select> tag here to create the dropdown menu -->
        <div class="input-group">
            <label for="rate-unit">Rate is per:</label>
            <select id="rate-unit" style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; font-size: 16px; background-color: #fff;">
                <option value="tola">One Tola</option>
                <option value="gram">One Gram</option>
            </select>
        </div>

        <div class="input-group">
            <label for="gold-weight">Weight of your gold (in Grams):</label>
            <input type="number" id="gold-weight" placeholder="e.g., 15">
        </div>

        <button id="calculate-btn">Calculate Value</button>

        <div id="result" class="result-box">
            <!-- The PKR result will appear here -->
        </div>
        
        <a href="../index.html" class="back-link">← Back to PickTool Home</a>
    </div>

    <!-- Connects to the new JS file below -->
    <script src="../assets/js/gold-calculator.js"></script>

    <!-- Combined Ad Container -->
    <div class="ad-container">
        <!-- Native Banner -->
        <script async="async" data-cfasync="false" src="https://pl30385676.effectivecpmnetwork.com/f26bff16986a00f00797d30a72cc69cd/invoke.js"></script>
        <div id="container-f26bff16986a00f00797d30a72cc69cd"></div>

        <!-- 320x50 Banner -->
        <div style="margin-top: 15px;">
            <script>
                atOptions = {
                    'key' : 'be0e2dff2e618dbdd1d0dd94294cffc8',
                    'format' : 'iframe',
                    'height' : 50,
                    'width' : 320,
                    'params' : {}
                };
            </script>
            <script src="https://www.highperformanceformat.com/be0e2dff2e618dbdd1d0dd94294cffc8/invoke.js"></script>
        </div>
    </div>

</body>
</html>
