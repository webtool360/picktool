<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PickTool</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

    <!-- Header Banner -->
    <header class="header">
        <h1>PICKTOOL</h1>
        <input type="text" id="searchBar" placeholder="Search tools..." class="search-bar">
    </header>

    <!-- Main Tool Grid -->
    <main class="container">
        <div class="tool-grid" id="toolGrid">
            <a href="tools/age-calculator.html" class="tool-card">Age</a>
            <a href="tools/bmi-calculator.html" class="tool-card">BMI</a>
            <a href="tools/gold-calculator.html" class="tool-card">Gold</a>
            <a href="tools/zakat-calculator.html" class="tool-card">Zakat</a>
            <a href="tools/discount-calculator.html" class="tool-card">Discount</a>
            <a href="tools/puzzle-game.html" class="tool-card">Puzzle Game</a>
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <p>&copy; 2026 PickTool. All rights reserved.</p>
        <p>Contact: nasir@picktool.com</p>
    </footer>

</body>
</html>
<script>
    document.getElementById('searchBar').addEventListener('keyup', function() {
        let filter = this.value.toLowerCase();
        let cards = document.querySelectorAll('.tool-card');
        cards.forEach(card => {
            card.style.display = card.innerText.toLowerCase().includes(filter) ? "" : "none";
        });
    });
</script>
