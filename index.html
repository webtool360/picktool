<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PICKTOOL | Professional Tools</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

    <header class="header">
        <h1>PICKTOOL</h1>
        <input type="text" class="search-bar" placeholder="Search tools...">
    </header>

    <nav class="nav-bar">
        <a href="#calc-content">Calculation</a>
        <a href="#surprised-content">Surprised</a>
    </nav>

    <!-- Calculation Section -->
    <div class="accordion-item">
        <button class="accordion-header" onclick="toggleAccordion('calc-content')">Calculation Tools ▾</button>
        <div id="calc-content" class="accordion-content active">
            <div class="tool-grid">
                <a href="tools/age-calculator.html" class="tool-card">Age</a>
                <a href="tools/bmi-calculator.html" class="tool-card">BMI</a>
                <a href="tools/gold-calculator.html" class="tool-card">Gold</a>
                <a href="tools/zakat-calculator.html" class="tool-card">Zakāt</a>
                <a href="tools/discount-calculator.html" class="tool-card">Discount</a>
                <a href="tools/complex-calculator.html" class="tool-card">Complex</a>
            </div>
        </div>
    </div>

    <!-- Surprised Section -->
    <div class="accordion-item">
        <button class="accordion-header" onclick="toggleAccordion('surprised-content')">Surprised Tools ▾</button>
        <div id="surprised-content" class="accordion-content">
            <div class="tool-grid">
                <a href="tools/password-maker.html" class="tool-card">Password</a>
                <a href="tools/qr-maker.html" class="tool-card">QR Code</a>
                <a href="tools/barcode-maker.html" class="tool-card">Bar Code</a>
                <a href="tools/name-maker.html" class="tool-card">Name Maker</a>
                <a href="tools/email-generator.html" class="tool-card">Email Gen</a>
            </div>
        </div>
    </div>

    <script>
        function toggleAccordion(id) {
            document.querySelectorAll('.accordion-content').forEach(c => c.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }
    </script>
</body>
</html>
